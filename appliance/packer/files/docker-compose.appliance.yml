services:
  sixtyops-mgmt:
    image: ghcr.io/sixtyops/manager:${APP_VERSION:-latest}
    container_name: sixtyops-management
    ports:
      - "1812:1812/udp"
    volumes:
      - /data/firmware:/app/firmware
      - /data/db:/app/data
      - /data/backups:/app/backups
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - SIXTYOPS_APPLIANCE=1
      - SIXTYOPS_IMAGE=ghcr.io/sixtyops/manager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 512m
    stop_grace_period: 60s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: sixtyops-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/sixtyops/nginx/conf.d:/etc/nginx/conf.d:ro
      - /data/certs:/etc/nginx/ssl
      - /opt/sixtyops/nginx/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      sixtyops-mgmt:
        condition: service_started
    mem_limit: 128m
    stop_grace_period: 10s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  autoheal:
    image: docker:27-cli
    container_name: sixtyops-autoheal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[autoheal] Starting container health monitor..."
        RESTART_COUNTS=""
        LAST_PRUNE_DAY=""
        while true; do
          sleep 30
          # Daily image prune to prevent disk fill from stale images
          TODAY=$$(date +%Y%m%d)
          if [ "$$TODAY" != "$$LAST_PRUNE_DAY" ]; then
            PRUNED=$$(docker image prune -f 2>/dev/null | tail -1)
            echo "[autoheal] Daily image prune: $$PRUNED"
            LAST_PRUNE_DAY="$$TODAY"
          fi
          # Health check and restart with backoff
          for id in $$(docker ps -q --filter "health=unhealthy" --filter "label=com.docker.compose.project"); do
            NAME=$$(docker inspect --format '{{.Name}}' "$$id" 2>/dev/null | sed 's|^/||')
            # Track restart count: NAME:COUNT:FIRST_RESTART_EPOCH
            NOW=$$(date +%s)
            ENTRY=$$(echo "$$RESTART_COUNTS" | tr ',' '\n' | grep "^$${NAME}:" | head -1)
            if [ -n "$$ENTRY" ]; then
              COUNT=$$(echo "$$ENTRY" | cut -d: -f2)
              FIRST=$$(echo "$$ENTRY" | cut -d: -f3)
              ELAPSED=$$((NOW - FIRST))
              if [ "$$COUNT" -ge 5 ] && [ "$$ELAPSED" -lt 600 ]; then
                echo "[autoheal] BACKOFF: $$NAME restarted $$COUNT times in $${ELAPSED}s â€” skipping (will retry after 10 min)"
                continue
              fi
              if [ "$$ELAPSED" -ge 600 ]; then
                COUNT=0
                FIRST=$$NOW
              fi
              COUNT=$$((COUNT + 1))
              RESTART_COUNTS=$$(echo "$$RESTART_COUNTS" | sed "s|$${NAME}:[^,]*|$${NAME}:$${COUNT}:$${FIRST}|")
            else
              COUNT=1
              FIRST=$$NOW
              if [ -n "$$RESTART_COUNTS" ]; then
                RESTART_COUNTS="$${RESTART_COUNTS},$${NAME}:$${COUNT}:$${FIRST}"
              else
                RESTART_COUNTS="$${NAME}:$${COUNT}:$${FIRST}"
              fi
            fi
            echo "[autoheal] Restarting unhealthy container: $$NAME (attempt $$COUNT/5)"
            docker restart "$$id" 2>/dev/null || true
          done
        done
    mem_limit: 32m
    restart: unless-stopped
