# Standalone overlay: adds nginx reverse proxy + Let's Encrypt certbot
# Usage: docker compose -f docker-compose.yml -f docker-compose.standalone.yml up -d --build
services:
  nginx:
    image: nginx:alpine
    container_name: tachyon-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      tachyon-mgmt:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  certbot:
    image: certbot/certbot
    container_name: tachyon-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  tachyon-mgmt:
    volumes:
      # Let's Encrypt certificates (for status checking)
      - ./certbot/conf:/etc/letsencrypt:ro
      # Nginx config (for SSL manager to write new configs)
      - ./nginx/conf.d:/app/nginx-conf
      # Mount standalone overlay for self-update (read-only)
      - ./docker-compose.standalone.yml:/app/docker-compose.standalone.yml:ro
