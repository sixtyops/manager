changelog:
  categories:
    - title: "New Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "Bug Fixes"
      labels:
        - "bug"
        - "fix"
    - title: "Maintenance"
      labels:
        - "chore"
        - "dependencies"
        - "docs"
        - "ci"
    - title: "Other Changes"
      labels:
        - "*"
