name: Dev SSO Validation

on:
  workflow_dispatch:
  schedule:
    - cron: "47 6 * * *"

concurrency:
  group: dev-sso-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dev-sso:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 45
    env:
      SIXTYOPS_TEST_URL: ${{ vars.SIXTYOPS_TEST_URL || secrets.SIXTYOPS_TEST_URL }}
      SIXTYOPS_TEST_USER: ${{ vars.SIXTYOPS_TEST_USER || secrets.SIXTYOPS_TEST_USER }}
      SIXTYOPS_TEST_PASS: ${{ secrets.SIXTYOPS_TEST_PASS }}
      SIXTYOPS_TEST_OIDC_PROVIDER_URL: ${{ vars.SIXTYOPS_TEST_OIDC_PROVIDER_URL || secrets.SIXTYOPS_TEST_OIDC_PROVIDER_URL }}
      SIXTYOPS_TEST_OIDC_CLIENT_ID: ${{ vars.SIXTYOPS_TEST_OIDC_CLIENT_ID || secrets.SIXTYOPS_TEST_OIDC_CLIENT_ID }}
      SIXTYOPS_TEST_OIDC_CLIENT_SECRET: ${{ secrets.SIXTYOPS_TEST_OIDC_CLIENT_SECRET }}
      SIXTYOPS_TEST_OIDC_REDIRECT_URI: ${{ vars.SIXTYOPS_TEST_OIDC_REDIRECT_URI || secrets.SIXTYOPS_TEST_OIDC_REDIRECT_URI }}
      SIXTYOPS_TEST_OIDC_ALLOWED_GROUP: ${{ vars.SIXTYOPS_TEST_OIDC_ALLOWED_GROUP || secrets.SIXTYOPS_TEST_OIDC_ALLOWED_GROUP }}
      SIXTYOPS_TEST_OIDC_ADMIN_GROUP: ${{ vars.SIXTYOPS_TEST_OIDC_ADMIN_GROUP || secrets.SIXTYOPS_TEST_OIDC_ADMIN_GROUP }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required SSO inputs
        id: validate_inputs
        run: |
          missing=()
          for name in \
            SIXTYOPS_TEST_URL \
            SIXTYOPS_TEST_USER \
            SIXTYOPS_TEST_PASS \
            SIXTYOPS_TEST_OIDC_PROVIDER_URL \
            SIXTYOPS_TEST_OIDC_CLIENT_ID \
            SIXTYOPS_TEST_OIDC_CLIENT_SECRET \
            SIXTYOPS_TEST_OIDC_REDIRECT_URI
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          missing_csv="$(IFS=,; echo "${missing[*]}")"
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "missing=$missing_csv" >> "$GITHUB_OUTPUT"

          echo "::warning::Skipping live SSO validation because required inputs are not configured: $missing_csv"
          {
            echo "### Dev SSO Validation skipped"
            echo
            echo "Required live SSO inputs are not configured for this repository or environment."
            echo
            echo "Missing inputs: \`$missing_csv\`"
            echo
            echo "Validation is soft-skipped until the live-dev secrets or variables are wired (tracked in issue #28). Re-run after secrets are populated."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Install test dependencies
        if: steps.validate_inputs.outputs.ready == 'true'
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Run non-blocking live SSO validation
        if: steps.validate_inputs.outputs.ready == 'true'
        run: |
          . .venv/bin/activate
          pytest -m "integration and dev_sso" -v --timeout=300
