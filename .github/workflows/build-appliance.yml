name: Build Appliance

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "App version tag (e.g., v1.2.0)"
        required: true
        type: string
  release:
    types: [published]

# Only build OVA for stable releases (not pre-releases)
jobs:
  build-ova:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && !github.event.release.prerelease)
    runs-on: [self-hosted, linux, x64, proxmox]
    timeout-minutes: 60
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine versions
        id: version
        run: |
          APPLIANCE_VERSION=$(cat appliance/VERSION | tr -d '[:space:]')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APP_VERSION="${{ inputs.app_version }}"
          else
            APP_VERSION="${{ github.event.release.tag_name }}"
          fi
          OVA_NAME="sixtyops-appliance-a${APPLIANCE_VERSION}-app${APP_VERSION}"
          echo "appliance_version=${APPLIANCE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ova_name=${OVA_NAME}" >> "$GITHUB_OUTPUT"
          echo "Building appliance: platform v${APPLIANCE_VERSION}, app ${APP_VERSION}"

      - name: Initialize Packer
        run: |
          cd appliance/packer
          packer init sixtyops.pkr.hcl

      - name: Build appliance image
        run: |
          cd appliance/packer
          packer build \
            -var "app_version=${{ steps.version.outputs.app_version }}" \
            -var "appliance_version=${{ steps.version.outputs.appliance_version }}" \
            -var "recovery_secret=${{ secrets.APPLIANCE_RECOVERY_SECRET }}" \
            -var "ghcr_token=${{ secrets.GITHUB_TOKEN }}" \
            sixtyops.pkr.hcl
        env:
          PACKER_LOG: 1

      - name: Prepare QCOW2 for Proxmox
        run: |
          qemu-img convert -c -f qcow2 -O qcow2 \
            appliance/packer/output-sixtyops/sixtyops-appliance \
            ${{ steps.version.outputs.ova_name }}.qcow2

      - name: Convert to OVA
        run: |
          python3 appliance/scripts/create-ova.py \
            appliance/packer/output-sixtyops/sixtyops-appliance \
            -o ${{ steps.version.outputs.ova_name }}.ova \
            -n sixtyops-appliance \
            -v ${{ steps.version.outputs.app_version }} \
            --memory 1024 \
            --disk-size 8G \
            --cpus 2

      - name: Upload artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.ova_name }}
          path: |
            ${{ steps.version.outputs.ova_name }}.ova
            ${{ steps.version.outputs.ova_name }}.qcow2
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.version.outputs.ova_name }}.ova
            ${{ steps.version.outputs.ova_name }}.qcow2
          tag_name: ${{ github.event.release.tag_name }}

      - name: Update latest-appliance release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OVA="${{ steps.version.outputs.ova_name }}.ova"
          QCOW2="${{ steps.version.outputs.ova_name }}.qcow2"
          APPLIANCE_VER="${{ steps.version.outputs.appliance_version }}"
          APP_VER="${{ steps.version.outputs.app_version }}"

          NOTES="Latest stable appliance (platform v${APPLIANCE_VER}, app ${APP_VER}).

          ## Install

          ### VMware / ESXi
          1. Download the \`.ova\` file
          2. In vSphere/ESXi: **Create/Register VM → Deploy from OVF** and select the .ova
          3. Boot the VM and follow the console setup wizard
          4. Open the displayed URL in your browser and add your devices

          ### Proxmox
          SSH into your Proxmox host and run (replace \`100\` with your VM ID and \`local-lvm\` with your storage name):
          \`\`\`bash
          curl -LO https://github.com/isolson/firmware-updater/releases/download/appliance-latest/sixtyops-appliance-latest.qcow2
          qm create 100 --name sixtyops --memory 2048 --cores 2 --net0 virtio,bridge=vmbr0
          qm importdisk 100 sixtyops-appliance-latest.qcow2 YOUR_STORAGE
          qm set 100 --scsi0 YOUR_STORAGE:vm-100-disk-0
          qm set 100 --boot order=scsi0
          qm set 100 --serial0 socket --vga serial0
          qm start 100
          \`\`\`
          Common storage names: \`local-lvm\`, \`local-zfs\`, \`ceph-pool\`. Check yours with \`pvesm status\`.
          Open the console and follow the setup wizard, then open the displayed URL in your browser."

          # Create release if it doesn't exist, or update the notes
          gh release create appliance-latest \
            --title "Latest Appliance" \
            --notes "$NOTES" \
            2>/dev/null || \
          gh release edit appliance-latest \
            --title "Latest Appliance" \
            --notes "$NOTES"

          # Upload versioned assets (--clobber replaces existing)
          gh release upload appliance-latest "$OVA" --clobber
          gh release upload appliance-latest "$QCOW2" --clobber

          # Upload fixed-name copies for stable download URLs
          cp "$OVA" sixtyops-appliance-latest.ova
          cp "$QCOW2" sixtyops-appliance-latest.qcow2
          gh release upload appliance-latest sixtyops-appliance-latest.ova --clobber
          gh release upload appliance-latest sixtyops-appliance-latest.qcow2 --clobber

      - name: Publish to public downloads repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_UPLOAD_TOKEN }}
        run: |
          OVA="${{ steps.version.outputs.ova_name }}.ova"
          QCOW2="${{ steps.version.outputs.ova_name }}.qcow2"
          APPLIANCE_VER="${{ steps.version.outputs.appliance_version }}"
          APP_VER="${{ steps.version.outputs.app_version }}"
          REPO="isolson/sixtyops-releases"

          NOTES="SixtyOps Appliance (platform v${APPLIANCE_VER}, app ${APP_VER}).

          ## Install

          ### VMware / ESXi
          1. Download the \`.ova\` file
          2. In vSphere/ESXi: **Create/Register VM → Deploy from OVF** and select the .ova
          3. Boot the VM and follow the console setup wizard
          4. Open the displayed URL in your browser and add your devices

          ### Proxmox
          SSH into your Proxmox host and run (replace \`100\` with your VM ID and \`local-lvm\` with your storage name):
          \`\`\`bash
          curl -LO https://github.com/isolson/sixtyops-releases/releases/download/appliance-latest/sixtyops-appliance-latest.qcow2
          qm create 100 --name sixtyops --memory 2048 --cores 2 --net0 virtio,bridge=vmbr0
          qm importdisk 100 sixtyops-appliance-latest.qcow2 YOUR_STORAGE
          qm set 100 --scsi0 YOUR_STORAGE:vm-100-disk-0
          qm set 100 --boot order=scsi0
          qm set 100 --serial0 socket --vga serial0
          qm start 100
          \`\`\`
          Common storage names: \`local-lvm\`, \`local-zfs\`, \`ceph-pool\`. Check yours with \`pvesm status\`.
          Open the console and follow the setup wizard, then open the displayed URL in your browser.

          Full docs: https://sixtyops.net#download"

          gh release create appliance-latest \
            --repo "$REPO" \
            --title "Latest Appliance" \
            --notes "$NOTES" \
            2>/dev/null || \
          gh release edit appliance-latest \
            --repo "$REPO" \
            --title "Latest Appliance" \
            --notes "$NOTES"

          # Upload versioned assets
          gh release upload appliance-latest "$OVA" --clobber --repo "$REPO"
          gh release upload appliance-latest "$QCOW2" --clobber --repo "$REPO"

          # Upload fixed-name copies for stable download URLs (curl-friendly)
          cp "$OVA" sixtyops-appliance-latest.ova
          cp "$QCOW2" sixtyops-appliance-latest.qcow2
          gh release upload appliance-latest sixtyops-appliance-latest.ova --clobber --repo "$REPO"
          gh release upload appliance-latest sixtyops-appliance-latest.qcow2 --clobber --repo "$REPO"

      - name: Cleanup build artifacts
        if: always()
        run: |
          rm -rf appliance/packer/output-sixtyops
          rm -f *.ova *.qcow2
          rm -f sixtyops-appliance-latest.ova sixtyops-appliance-latest.qcow2
