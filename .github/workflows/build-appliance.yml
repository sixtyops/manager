name: Build Appliance

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "App version tag (e.g., v1.2.0)"
        required: true
        type: string
  release:
    types: [published]

# Only build OVA for stable releases (not pre-releases)
jobs:
  build-ova:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && !github.event.release.prerelease)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine versions
        id: version
        run: |
          APPLIANCE_VERSION=$(cat appliance/VERSION | tr -d '[:space:]')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APP_VERSION="${{ inputs.app_version }}"
          else
            APP_VERSION="${{ github.event.release.tag_name }}"
          fi
          OVA_NAME="tachyon-appliance-a${APPLIANCE_VERSION}-app${APP_VERSION}"
          echo "appliance_version=${APPLIANCE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ova_name=${OVA_NAME}" >> "$GITHUB_OUTPUT"
          echo "Building appliance: platform v${APPLIANCE_VERSION}, app ${APP_VERSION}"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils ovmf

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Initialize Packer
        run: |
          cd appliance/packer
          packer init tachyon.pkr.hcl

      - name: Build appliance image
        run: |
          cd appliance/packer
          packer build \
            -var "app_version=${{ steps.version.outputs.app_version }}" \
            -var "appliance_version=${{ steps.version.outputs.appliance_version }}" \
            -var "recovery_secret=${{ secrets.APPLIANCE_RECOVERY_SECRET }}" \
            -var "ghcr_token=${{ secrets.GITHUB_TOKEN }}" \
            tachyon.pkr.hcl
        env:
          PACKER_LOG: 1

      - name: Prepare QCOW2 for Proxmox
        run: |
          qemu-img convert -c -f qcow2 -O qcow2 \
            appliance/packer/output-tachyon/tachyon-appliance \
            ${{ steps.version.outputs.ova_name }}.qcow2

      - name: Convert to OVA
        run: |
          python3 appliance/scripts/create-ova.py \
            appliance/packer/output-tachyon/tachyon-appliance \
            -o ${{ steps.version.outputs.ova_name }}.ova \
            -n tachyon-appliance \
            -v ${{ steps.version.outputs.app_version }} \
            --memory 1024 \
            --disk-size 8G \
            --cpus 2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.ova_name }}
          path: |
            ${{ steps.version.outputs.ova_name }}.ova
            ${{ steps.version.outputs.ova_name }}.qcow2
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.version.outputs.ova_name }}.ova
            ${{ steps.version.outputs.ova_name }}.qcow2
          tag_name: ${{ github.event.release.tag_name }}

      - name: Update latest-appliance release (private repo)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OVA="${{ steps.version.outputs.ova_name }}.ova"
          QCOW2="${{ steps.version.outputs.ova_name }}.qcow2"
          APPLIANCE_VER="${{ steps.version.outputs.appliance_version }}"
          APP_VER="${{ steps.version.outputs.app_version }}"

          NOTES="Latest stable appliance (platform v${APPLIANCE_VER}, app ${APP_VER}).

          **VMware/VirtualBox:** Download the \`.ova\` file and import.

          **Proxmox:** Download the \`.qcow2\` file, then:
          \`\`\`
          qm create <vmid> --name tachyon --memory 1024 --cores 2 --net0 virtio,bridge=vmbr0
          qm importdisk <vmid> <filename>.qcow2 <storage>
          qm set <vmid> --virtio0 <storage>:vm-<vmid>-disk-0
          qm set <vmid> --boot order=virtio0
          qm set <vmid> --agent enabled=1
          qm set <vmid> --serial0 socket
          qm start <vmid>
          \`\`\`
          Use \`qm terminal <vmid>\` for serial console access."

          # Create release if it doesn't exist, or update the notes
          gh release create appliance-latest \
            --title "Latest Appliance" \
            --notes "$NOTES" \
            2>/dev/null || \
          gh release edit appliance-latest \
            --title "Latest Appliance" \
            --notes "$NOTES"

          # Upload both formats (--clobber replaces existing assets)
          gh release upload appliance-latest "$OVA" --clobber
          gh release upload appliance-latest "$QCOW2" --clobber

      - name: Publish to public downloads repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_UPLOAD_TOKEN }}
        run: |
          OVA="${{ steps.version.outputs.ova_name }}.ova"
          QCOW2="${{ steps.version.outputs.ova_name }}.qcow2"
          APPLIANCE_VER="${{ steps.version.outputs.appliance_version }}"
          APP_VER="${{ steps.version.outputs.app_version }}"
          REPO="isolson/tachyon-manager-releases"

          NOTES="Tachyon Manager Appliance (platform v${APPLIANCE_VER}, app ${APP_VER}).

          **VMware/VirtualBox:** Download the \`.ova\` file and import.

          **Proxmox:** Download the \`.qcow2\` file, then:
          \`\`\`
          qm create <vmid> --name tachyon --memory 1024 --cores 2 --net0 virtio,bridge=vmbr0
          qm importdisk <vmid> <filename>.qcow2 <storage>
          qm set <vmid> --virtio0 <storage>:vm-<vmid>-disk-0
          qm set <vmid> --boot order=virtio0
          qm set <vmid> --agent enabled=1
          qm set <vmid> --serial0 socket
          qm start <vmid>
          \`\`\`
          Use \`qm terminal <vmid>\` for serial console access."

          gh release create appliance-latest \
            --repo "$REPO" \
            --title "Latest Appliance" \
            --notes "$NOTES" \
            2>/dev/null || \
          gh release edit appliance-latest \
            --repo "$REPO" \
            --title "Latest Appliance" \
            --notes "$NOTES"

          gh release upload appliance-latest "$OVA" --clobber --repo "$REPO"
          gh release upload appliance-latest "$QCOW2" --clobber --repo "$REPO"
