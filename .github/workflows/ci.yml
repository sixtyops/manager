name: CI

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - 'docs/**'
      - 'website/**'
      - '*.md'
      - '.context/**'
      - 'LICENSE'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - 'docs/**'
      - 'website/**'
      - '*.md'
      - '.context/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [self-hosted, linux, x64, proxmox]
    steps:
      - uses: actions/checkout@v4

      - run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
          pytest -v

  docker-build:
    runs-on: [self-hosted, linux, x64, proxmox]
    steps:
      - uses: actions/checkout@v4

      - run: docker build -t firmware-updater:ci .
  appliance-check:
    runs-on: [self-hosted, linux, x64, proxmox]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for appliance changes
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD -- appliance/)
          if [ -n "$CHANGED" ]; then
            echo "::warning::Appliance files changed. Remember to trigger an appliance rebuild after the stable release."
            echo "Changed files:"
            echo "$CHANGED"
          fi
