name: CI

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - 'docs/**'
      - 'website/**'
      - '*.md'
      - '.context/**'
      - 'LICENSE'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - 'docs/**'
      - 'website/**'
      - '*.md'
      - '.context/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - run: pip install -r requirements.txt

      - run: pytest -v

  appliance-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for appliance changes
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD -- appliance/)
          if [ -n "$CHANGED" ]; then
            echo "::warning::Appliance files changed. Remember to trigger an appliance rebuild after the stable release."
            echo "Changed files:"
            echo "$CHANGED"
          fi
