name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'website/**'
      - '*.md'
      - '.context/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'website/**'
      - '*.md'
      - '.context/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
          pytest -v

  docker-build:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - run: docker build -t firmware-updater:ci .
