name: Installer Smoke

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  install-smoke:
    runs-on: [self-hosted, linux, x64, proxmox]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Prepare local git remote for installer
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git init --bare /tmp/tachyon-origin.git
          git push --force /tmp/tachyon-origin.git HEAD:refs/heads/main

      - name: Fresh install via install.sh
        run: |
          sudo env \
            TACHYON_REPO_URL="file:///tmp/tachyon-origin.git" \
            TACHYON_BRANCH="main" \
            TACHYON_INSTALL_DIR="/opt/tachyon-ci" \
            bash scripts/install.sh

      - name: Validate app is reachable after install
        run: |
          sudo docker compose \
            -f /opt/tachyon-ci/docker-compose.yml \
            -f /opt/tachyon-ci/docker-compose.standalone.yml \
            ps

          code=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost/login)
          if [ "$code" != "200" ] && [ "$code" != "302" ]; then
            echo "Unexpected /login status: $code"
            exit 1
          fi

      - name: Re-run installer (upgrade/idempotency path)
        run: |
          sudo env \
            TACHYON_REPO_URL="file:///tmp/tachyon-origin.git" \
            TACHYON_BRANCH="main" \
            TACHYON_INSTALL_DIR="/opt/tachyon-ci" \
            bash scripts/install.sh

      - name: Validate app is reachable after re-run
        run: |
          code=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost/login)
          if [ "$code" != "200" ] && [ "$code" != "302" ]; then
            echo "Unexpected /login status after re-run: $code"
            exit 1
          fi

      - name: Teardown
        if: always()
        run: |
          if [ -d /opt/tachyon-ci ]; then
            sudo docker compose \
              -f /opt/tachyon-ci/docker-compose.yml \
              -f /opt/tachyon-ci/docker-compose.standalone.yml \
              down -v --remove-orphans || true
            sudo rm -rf /opt/tachyon-ci
          fi
          sudo rm -f /etc/systemd/system/tachyon.service
          sudo rm -rf /tmp/tachyon-origin.git
          git config --global --unset user.email || true
          git config --global --unset user.name || true
