name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_run:
    workflows: ["Release"]
    types: [completed]   # deploy AFTER Release finishes (image pushed), not when the GitHub Release is created
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  deploy:
    # On a Release completion, only deploy if it succeeded (i.e. docker-push ran).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tags to resolve the latest release

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Pin install snippet to the latest release tag
        run: |
          TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)
          [ -n "$TAG" ] || TAG="${{ github.event.workflow_run.head_branch }}"
          if [ -z "$TAG" ]; then
            echo "::error::Could not resolve a release tag; refusing to publish the placeholder"
            exit 1
          fi
          # Never advertise a tag whose image isn't in GHCR yet (release.yml
          # creates the GitHub Release before docker-push completes).
          if ! docker manifest inspect "ghcr.io/sixtyops/manager:$TAG" >/dev/null 2>&1; then
            echo "::error::Image ghcr.io/sixtyops/manager:$TAG not in GHCR yet; refusing to pin a missing image"
            exit 1
          fi
          sed -i "s|__LATEST_TAG__|$TAG|g" website/index.html
          grep -q "manager:$TAG" website/index.html || { echo "::error::substitution failed"; exit 1; }

      - name: Sync to S3
        run: |
          aws s3 sync website/ s3://${{ vars.WEBSITE_S3_BUCKET }}/ \
            --delete \
            --exclude "DEPLOY.md" \
            --exclude "icon-preview.html" \
            --cache-control "max-age=3600" \
            --content-type "text/html" \
            --exclude "*.css" --exclude "*.js" --exclude "*.svg" --exclude "*.png" --exclude "*.jpg" --exclude "*.ico" --exclude "*.woff2"

          # Re-sync assets with longer cache (fonts, css, js, images)
          aws s3 sync website/assets/ s3://${{ vars.WEBSITE_S3_BUCKET }}/assets/ \
            --cache-control "max-age=86400"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
