services:
  tachyon-mgmt:
    build: .
    container_name: tachyon-management
    ports:
      - "8000:8000"
    volumes:
      # Persist firmware files
      - ./firmware:/app/firmware
      # Persist database
      - ./data:/app/data
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      # Default bootstrap password — you will be prompted to change it on first login
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      # Optional RADIUS settings
      # - RADIUS_SERVER=
      # - RADIUS_SECRET=
      # - RADIUS_PORT=1812
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 512m
    cpus: "1.0"
    restart: unless-stopped
