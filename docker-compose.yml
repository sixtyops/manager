services:
  tachyon-mgmt:
    build: .
    container_name: tachyon-management
    ports:
      - "8000:8000"
    volumes:
      # Persist firmware files
      - ./firmware:/app/firmware
      # Persist database
      - ./data:/app/data
      # Git backup repository
      - ./backups:/app/backups
      # Docker socket for self-update capability
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount compose file(s) for self-update (read-only)
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      # ADMIN_PASSWORD is optional - if not set, you'll be prompted to create
      # a password on first run via the web interface
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 512m
    cpus: "1.0"
    restart: unless-stopped
