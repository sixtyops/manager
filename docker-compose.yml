services:
  tachyon-mgmt:
    build: .
    container_name: tachyon-management
    ports:
      - "8000:8000"
    volumes:
      # Persist firmware files
      - ./firmware:/app/firmware
      # Persist database
      - ./data:/app/data
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=changeme
      # Optional RADIUS settings
      # - RADIUS_SERVER=
      # - RADIUS_SECRET=
      # - RADIUS_PORT=1812
    restart: unless-stopped
