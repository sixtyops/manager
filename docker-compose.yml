services:
  tachyon-mgmt:
    build: .
    container_name: tachyon-management
    ports:
      - "8000:8000"
    volumes:
      # Persist firmware files
      - ./firmware:/app/firmware
      # Persist database
      - ./data:/app/data
      # Git backup repository
      - ./backups:/app/backups
      # Docker socket for self-update capability
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount repo root for self-update (git pull + docker compose build)
      - .:/app/repo
      # Mount compose file(s) for self-update (read-only)
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      # ADMIN_PASSWORD is optional - if not set, you'll be prompted to create
      # a password on first run via the web interface
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 512m
    cpus: "1.0"
    restart: unless-stopped

  radius:
    image: freeradius/freeradius-server:latest-3.2-alpine
    container_name: tachyon-radius
    ports:
      - "1812:1812/udp"
    volumes:
      - ./data/radius/clients.conf:/etc/raddb/clients.conf:ro
      - ./data/radius/mods-config/files/authorize:/etc/raddb/mods-config/files/authorize:ro
    depends_on:
      tachyon-mgmt:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -s /etc/raddb/clients.conf && test -s /etc/raddb/mods-config/files/authorize && /opt/sbin/radiusd -C -d /etc/raddb >/dev/null 2>&1 && netstat -anu | grep -q ':1812 '"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: tachyon-nginx
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      tachyon-mgmt:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
