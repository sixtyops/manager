services:
  sixtyops-mgmt:
    build: .
    container_name: sixtyops-management
    # Host port publishes are env-overridable so site-specific deployments
    # (e.g. a fork that needs to bind a single host IP, or shift the host
    # port off 8000 / 1812 because something else owns them) don't have to
    # hand-edit this file before every release — which would block the
    # in-app self-update path. Set BIND_IP / HOST_PORT / RADIUS_HOST_PORT
    # in a .env file next to this one or in the shell that runs
    # `docker compose up`. Defaults match the historical 0.0.0.0:8000 /
    # 0.0.0.0:1812 publishes.
    ports:
      - "${BIND_IP:-0.0.0.0}:${HOST_PORT:-8000}:8000"
      - "${BIND_IP:-0.0.0.0}:${RADIUS_HOST_PORT:-1812}:1812/udp"
    volumes:
      # Persist firmware files
      - ./firmware:/app/firmware
      # Persist database
      - ./data:/app/data
      # Git backup repository
      - ./backups:/app/backups
      # Docker socket for self-update capability
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount repo root for self-update (git pull + docker compose build)
      - .:/app/repo
      # Mount compose file(s) for self-update (read-only)
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      # ADMIN_PASSWORD is optional - if not set, you'll be prompted to create
      # a password on first run via the web interface
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # Set SEED_DATA=1 to populate sample devices/sites/templates on startup
      - SEED_DATA=${SEED_DATA:-}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    mem_limit: 512m
    cpus: "1.0"
    restart: unless-stopped
    stop_grace_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    container_name: sixtyops-nginx
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      sixtyops-mgmt:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
