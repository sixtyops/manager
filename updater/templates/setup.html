<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Unofficial Tachyon Networks Bulk Updater</title>
    <link rel="stylesheet" href="/static/common.css">
    <style>
        .info-message {
            background: #1e3a5f;
            color: #93c5fd;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Change Default Password</h1>
        <p class="subtitle">Please set a new password before continuing</p>

        <div class="info-message">
            For security, you must change the default admin password. Your new password must be at least 8 characters.
        </div>

        <div class="error-message {{ 'visible' if error else '' }}">
            {{ error or '' }}
        </div>

        <form method="POST" action="/setup">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" autocomplete="current-password" required autofocus>
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" autocomplete="new-password" required minlength="8">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required minlength="8">
            </div>
            <button type="submit" class="btn-primary">Set Password</button>
        </form>
    </div>
</body>
</html>
