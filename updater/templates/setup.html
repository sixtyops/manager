<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Unofficial Tachyon Networks Bulk Updater</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .setup-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        .setup-card h1 {
            font-size: 1.4rem;
            color: #f1f5f9;
            text-align: center;
            margin-bottom: 8px;
        }

        .setup-card p.subtitle {
            color: #64748b;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 0.95rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .error-message {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .info-message {
            background: #1e3a5f;
            color: #93c5fd;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        .btn-setup {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-setup:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="setup-card">
        <h1>Change Default Password</h1>
        <p class="subtitle">Please set a new password before continuing</p>

        <div class="info-message">
            For security, you must change the default admin password. Your new password must be at least 8 characters.
        </div>

        <div class="error-message {{ 'visible' if error else '' }}">
            {{ error or '' }}
        </div>

        <form method="POST" action="/setup">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" autocomplete="current-password" required autofocus>
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" autocomplete="new-password" required minlength="8">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required minlength="8">
            </div>
            <button type="submit" class="btn-setup">Set Password</button>
        </form>
    </div>
</body>
</html>
